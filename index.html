<!DOCTYPE html>
<html>
<head>
    <title>Dezshiner</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            text-align: center;
        }

        /* ===== HERO SLIDER ===== */

        .hero {
            position: relative;
            height: 80vh;
            overflow: hidden;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* ===== CONTENT ===== */

        .section {
            padding: 60px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .grid img {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .grid img:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        a {
            text-decoration: none;
            color: white;
            background: black;
            padding: 12px 25px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        a:hover {
            background: #333;
        }

        footer {
            background: black;
            color: white;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<!-- ===== HERO BANNER ===== -->

<header class="hero">
    <div class="slider">
        <img src="banner1.jpg" class="slide active">
        <img src="banner2.jpg" class="slide">
    </div>
</header>

<!-- ===== ABOUT ===== -->

<div class="section">
    <h2>About</h2>
    <p>Welcome to Dezshiner. A fashion brand focused on bold identity and modern street style.</p>
</div>

<!-- ===== GALLERY ===== -->

<div class="section">
    <h2>Gallery</h2>
    <div class="grid">
        <img src="firstpost.jpg">
        <img src="2ndpost.jpg">
        <img src="3rdpost.jpg">
        <img src="4thpost.jpg">
        <img src="5thpost.jpg">
    </div>
</div>

<!-- ===== CONTACT ===== -->

<div class="section">
    <h2>Contact</h2>
    <a href="https://instagram.com/_dezshiner_" target="_blank">Instagram</a>
</div>

<footer>
    © 2026 Dezshiner. All Rights Reserved.
</footer>

<!-- ===== SLIDER SCRIPT ===== -->

<script>
let slides = document.querySelectorAll(".slide");
let current = 0;

function changeSlide() {
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");
}

setInterval(changeSlide, 3500);
</script>

</body>
</html>
