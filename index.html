<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dezshiner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            text-align: center;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            height: 60vh;
            overflow: hidden;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* Overlay text */
        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 2;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .hero-text h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 4px;
        }

        .hero-text p {
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .section {
            padding: 60px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .grid img {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .grid img:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        a {
            text-decoration: none;
            color: white;
            background: black;
            padding: 12px 25px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        a:hover {
            background: #333;
        }

        footer {
            background: black;
            color: white;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<header class="hero">
    <div class="slider">
        <img src="banner1.jpg" class="slide active">
        <img src="banner2.jpg" class="slide">
    </div>

    <div class="hero-text">
        <h1>DEZSHINER</h1>
        <p>Fashion • Style • Identity</p>
    </div>
</header>

<div class="section">
    <h2>About</h2>
    <p>Welcome to Dezshiner. A fashion brand focused on bold identity and modern street style.</p>
</div>

<div class="section">
    <h2>Gallery</h2>
    <div class="grid">
        <img src="firstpost.jpg">
        <img src="2ndpost.jpg">
        <img src="3rdpost.jpg">
        <img src="4thpost.jpg">
        <img src="5thpost.jpg">
    </div>
</div>

<div class="section">
    <h2>Contact</h2>
    <a href="https://instagram.com/_dezshiner_" target="_blank">Instagram</a>
</div>

<footer>
    © 2026 Dezshiner. All Rights Reserved.
</footer>

<script>
    const slides = document.querySelectorAll(".slide");
    let current = 0;

    function changeSlide() {
        slides[current].classList.remove("active");
        current = (current + 1) % slides.length;
        slides[current].classList.add("active");
    }

    setInterval(changeSlide, 3500);
</script>

</body>
</html>
