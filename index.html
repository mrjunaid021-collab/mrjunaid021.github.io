<!DOCTYPE html>
<html>
<head>
    <title>Dezshiner</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            text-align: center;
        }

        header {
            background: black;
            color: white;
            padding: 40px 20px;
        }

        h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 3px;
        }

        .section {
            padding: 40px 20px;
        }

        .gallery img {
            width: 250px;
            margin: 10px;
            border-radius: 10px;
        }

        footer {
            background: black;
            color: white;
            padding: 20px;
            margin-top: 40px;
        }

        a {
            text-decoration: none;
            color: white;
            background: black;
            padding: 10px 20px;
            border-radius: 5px;
        }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

.grid img {
    width: 100%;
    border-radius: 12px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}
    </style>

</head>

<body>

<header>
    <h1>DEZSHINER</h1>
    <p>Fashion • Style • Identity</p>
</header>

<div class="section">
    <h2>About</h2>
    <p>Welcome to Dezshiner. A fashion brand focused on bold identity and modern street style.</p>
</div>

<div class="section gallery">
    <h2>Gallery</h2>
<div class="section gallery">
    <h2>Gallery</h2>
    <div class="grid">
        <img src="firstpost.jpg">
        <img src="2ndpost.jpg">
        <img src="3rdpost.jpg">
        <img src="4thpost.jpg">
        <img src="5thpost.jpg">
    </div>
</div>
</div>

<div class="section">
    <h2>Contact</h2>
    <a href="https://instagram.com/_dezshiner_">Instagram</a>
</div>

<footer>
    © 2026 Dezshiner. All Rights Reserved.
</footer>

</body>
</html>
